	<body style="background:#eef2ff;">

    <div class="container-fluid py-5">

        <div class="row">
            <div class="col-md-6 offset-md-3">

                <div class="card shadow-lg border-0">

                    <div class="card-header bg-dark text-white text-center" style="background:#4f46e5;">
                        <h2 class="mb-0">
                            <i class="fa-solid fa-store mr-2"></i>
                            Product Form
                        </h2>
                    </div>

                    <div class="card-body">

                        <form id="productform">

                            <div class="form-group">
                                <label for="category" class="font-weight-bold">
                                    Category *
                                </label>
                                <input type="text" class="form-control" id="category">
                            </div>

                            <div class="form-group">
                                <label for="title" class="font-weight-bold">
                                    Title *
                                </label>
                                <input type="text" class="form-control" id="title">
                            </div>

                            <div class="form-group">
                                <label for="description" class="font-weight-bold">
                                    Description *
                                </label>
                                <textarea class="form-control" rows="3" id="description"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="price" class="font-weight-bold">
                                    Price *
                                </label>
                                <input type="number" class="form-control" id="price">
                            </div>

                            <div class="form-group">
                                <label for="image" class="font-weight-bold">
                                    Image URL *
                                </label>
                                <input type="url" class="form-control" id="image">
                            </div>

                            <div class="form-group">
                                <label for="rating" class="font-weight-bold">
                                    Rating *
                                </label>

                                <select class="form-control" id="rating">
                                    <option value="1">1 🌟</option>
                                    <option value="2">2 🌟🌟</option>
                                    <option value="3">3 🌟🌟🌟</option>
                                    <option value="4">4 🌟🌟🌟🌟</option>
                                    <option value="5">5 🌟🌟🌟🌟🌟</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="Count" class="font-weight-bold">
                                    Count *
                                </label>
                                <input type="text" class="form-control" id="Count">
                            </div>

                            <button
                                class="btn btn-success btn-block"
                                id="Addproduct">
                                <i class="fa-solid fa-plus mr-2"></i>
                                Add Product
                            </button>

                            <button
                                type="button"
                                class="d-none btn btn-warning text-white btn-block"
                                id="Updateproduct">
                                <i class="fa-solid fa-pen mr-2"></i>
                                Update Product
                            </button>

                        </form>

                    </div>
                </div>

            </div>
        </div>
